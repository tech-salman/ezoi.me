<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | ezoi.me</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      opacity: 0.15;
      background-image: 
        linear-gradient(to right, rgba(140, 161, 255, 0.2) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(140, 161, 255, 0.2) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: bold;
      background: linear-gradient(90deg, #6f7bff, #20d7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 10px;
      line-height: 1;
    }
    .error-message {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      margin: 10px 0 40px;
      color: var(--muted);
      max-width: 500px;
    }
    .return-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      font-size: clamp(1rem, 3.5vw, 1.15rem);
      font-weight: 600;
      color: white;
      background: linear-gradient(140deg, #6f7bff, #20d7ff);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(111, 123, 255, 0.4);
      transition: all 0.3s ease;
    }
    .return-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(111, 123, 255, 0.5);
    }

    /* Extra responsiveness */
    @media (max-width: 480px) {
      .error-page {
        padding: 15px;
      }
      .return-btn {
        padding: 14px 32px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="error-page">
    <h1 class="error-code">404</h1>
    <p class="error-message">Oops! The page you're looking for doesn't exist.</p>
    
    <a href="/" class="return-btn">
      ← Return to ezoi.me
    </a>
  </div>
</body>
</html>
